name: Release Please

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Run Release Please
        id: release
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          set -euo pipefail

          version="$(node -p "require('./package.json').version")"
          tag="$(node -p "'v' + require('./package.json').version")"
          if gh release view "$tag" >/dev/null 2>&1; then
            release_existed=true
          else
            release_existed=false
          fi

          set +e
          npx --yes release-please@17.6.0 github-release \
            --repo-url "$GITHUB_REPOSITORY" \
            --release-type node \
            --token "$RELEASE_PLEASE_TOKEN"
          release_status=$?
          set -e

          if [ "$release_status" -ne 0 ] && ! gh release view "$tag" >/dev/null 2>&1; then
            target="$(gh pr list \
              --state merged \
              --search "release ${version} in:title" \
              --json mergeCommit,mergedAt \
              --jq 'sort_by(.mergedAt) | last | .mergeCommit.oid')"
            if [ -z "$target" ] || [ "$target" = null ]; then
              exit "$release_status"
            fi

            notes_json="$(mktemp)"
            notes_body="$(mktemp)"
            release_payload="$(mktemp)"
            gh api "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
              -f tag_name="$tag" \
              -f target_commitish="$target" > "$notes_json"
            jq -r '.body' "$notes_json" > "$notes_body"
            jq -n \
              --arg tag "$tag" \
              --arg target "$target" \
              --arg name "$(jq -r '.name' "$notes_json")" \
              --rawfile body "$notes_body" \
              '{tag_name: $tag, target_commitish: $target, name: $name, body: $body, draft: false, prerelease: false}' \
              > "$release_payload"

            gh api "repos/$GITHUB_REPOSITORY/releases" \
              --method POST \
              --input "$release_payload" >/dev/null
          fi

          if [ "$release_existed" = false ] && gh release view "$tag" >/dev/null 2>&1; then
            echo "release_created=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_created=false" >> "$GITHUB_OUTPUT"
          fi

          npx --yes release-please@17.6.0 release-pr \
            --repo-url "$GITHUB_REPOSITORY" \
            --release-type node \
            --token "$RELEASE_PLEASE_TOKEN"

      - run: npm ci
        if: ${{ steps.release.outputs.release_created }}

      - run: npm publish --access public
        if: ${{ steps.release.outputs.release_created }}
