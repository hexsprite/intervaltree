name: Release Please

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Probe release token
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          set -euo pipefail
          gh api user --jq '.login'
          release_id="$(gh api "repos/$GITHUB_REPOSITORY/releases" -X POST \
            -f tag_name=codex-actions-token-permission-test \
            -f target_commitish="$GITHUB_SHA" \
            -f name=codex-actions-token-permission-test \
            -F draft=true \
            --jq '.id')"
          gh api "repos/$GITHUB_REPOSITORY/releases/$release_id" -X DELETE

      - name: Run Release Please
        id: release
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          set -euo pipefail

          tag="$(node -p "'v' + require('./package.json').version")"
          if gh release view "$tag" >/dev/null 2>&1; then
            release_existed=true
          else
            release_existed=false
          fi

          npx --yes release-please@17.6.0 github-release \
            --repo-url "$GITHUB_REPOSITORY" \
            --release-type node \
            --token "$RELEASE_PLEASE_TOKEN"

          if [ "$release_existed" = false ] && gh release view "$tag" >/dev/null 2>&1; then
            echo "release_created=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_created=false" >> "$GITHUB_OUTPUT"
          fi

          npx --yes release-please@17.6.0 release-pr \
            --repo-url "$GITHUB_REPOSITORY" \
            --release-type node \
            --token "$RELEASE_PLEASE_TOKEN"

      - run: npm ci
        if: ${{ steps.release.outputs.release_created }}

      - run: npm publish --access public
        if: ${{ steps.release.outputs.release_created }}
